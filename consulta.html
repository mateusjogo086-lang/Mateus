<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MP Empréstimo - Consulta</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;padding:20px}
.container{max-width:440px;margin:0 auto}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-top:10px}
.logo-icon{width:40px;height:40px;background:#27ae60;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.logo-name{font-size:15px;font-weight:700}
.logo-sub{font-size:11px;color:#8b949e}
.nome{font-size:26px;font-weight:700;margin-bottom:4px}
.data{font-size:12px;color:#8b949e;margin-bottom:16px}
.total-box{background:linear-gradient(135deg,#0d2818,#152a1e);border-radius:14px;padding:16px;border:1px solid rgba(46,204,113,.2);margin-bottom:14px}
.total-label{font-size:11px;color:#2ecc71;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.total-val{font-size:34px;font-weight:700;color:#2ecc71}
.total-sub{font-size:12px;color:#8b949e;margin-top:4px}
.emp-card{background:#161b22;border-radius:14px;border:1px solid #30363d;padding:14px;margin-bottom:10px}
.emp-title{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.due{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500;margin-bottom:10px}
.val-box{background:linear-gradient(135deg,#0d2818,#152a1e);border-radius:10px;padding:12px;border:1px solid rgba(46,204,113,.2);margin-bottom:8px}
.val-label{font-size:10px;color:#2ecc71;text-transform:uppercase;letter-spacing:.5px}
.val{font-size:22px;font-weight:700;color:#2ecc71}
.val-sub{font-size:11px;color:#8b949e;margin-top:2px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.info-item{background:#1c2430;border-radius:8px;padding:8px 10px}
.info-label{font-size:10px;color:#8b949e}
.info-val{font-size:13px;font-weight:600}
.pix-box{background:#1c2430;border-radius:12px;padding:12px 14px;border:1px solid #30363d;margin-top:12px;text-align:center}
.pix-label{font-size:11px;color:#8b949e;margin-bottom:4px}
.pix-val{font-size:16px;font-weight:700;color:#2ecc71}
.error{text-align:center;padding:60px 20px}
.error-icon{font-size:48px;margin-bottom:12px}
.error-txt{font-size:15px;color:#8b949e}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-icon">💰</div>
    <div><div class="logo-name">MP Empréstimo</div><div class="logo-sub">Consulta de saldo</div></div>
  </div>
  <div id="conteudo"></div>
</div>
<script>
function fmtBRL(n){return 'R$ '+Number(n).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');}
function fmtData(s){if(!s)return '';var p=s.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function hoje(){return new Date();}
function diasEntre(d1s,d2){return Math.floor((d2-new Date(d1s+'T12:00:00'))/86400000);}
function diasVencer(s){return Math.ceil((new Date(s+'T12:00:00')-hoje())/86400000);}

function calcValor(e) {
  // Bullet: valor fixo
  if (e.vp && e.b) return e.vp;
  // Parcela fixa: cresce até o teto
  if (e.vp) {
    var dias = Math.max(0, diasEntre(e.i, hoje()));
    var vd = e.p * (1 + (e.t/100/30) * dias);
    return Math.min(vd, e.vp);
  }
  var dias = Math.max(0, diasEntre(e.i, hoje()));
  return e.p * (1 + (e.t/100/30) * dias);
}

function calcValorFinal(e) {
  if (e.vp) return e.vp;
  return e.p * (1 + e.t/100);
}

// Pega parâmetros — suporta formato novo (c,d) e antigo (cliente,dados)
var params = new URLSearchParams(window.location.search);
var cliente = params.get('c') || params.get('cliente');
var dadosStr = params.get('d') || params.get('dados');
var cont = document.getElementById('conteudo');

if (!cliente || !dadosStr) {
  cont.innerHTML = '<div class="error"><div class="error-icon">🔒</div><div class="error-txt">Link inválido ou expirado.</div></div>';
} else {
  try {
    var emprestimos = JSON.parse(decodeURIComponent(escape(atob(dadosStr))));
    var dataHoje = hoje().toLocaleDateString('pt-BR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    var totalHoje = emprestimos.reduce(function(s,e){return s+calcValor(e);},0);
    var porDia = emprestimos.reduce(function(s,e){return s+(e.vp?0:e.p*e.t/100/30);},0);

    var html = '<div class="nome">'+cliente+'</div>'
      +'<div class="data">📅 '+dataHoje+'</div>'
      +'<div class="total-box">'
      +'<div class="total-label">Total em aberto hoje</div>'
      +'<div class="total-val">'+fmtBRL(totalHoje)+'</div>'
      +(porDia>0?'<div class="total-sub">⚡ '+fmtBRL(porDia)+' por dia · '+emprestimos.length+' empréstimo'+(emprestimos.length>1?'s':'')+'</div>':'<div class="total-sub">'+emprestimos.length+' empréstimo'+(emprestimos.length>1?'s':'')+'</div>')
      +'</div>';

    emprestimos.forEach(function(e, idx) {
      var vh = calcValor(e);
      var vf = calcValorFinal(e);
      var pd = e.p * e.t / 100 / 30;
      var dv = diasVencer(e.v);
      var cor = dv<0?'#e74c3c':dv<=5?'#f39c12':'#2ecc71';
      var dvTxt = dv<0?'⚠️ Venceu há '+Math.abs(dv)+' dias':dv===0?'⚠️ Vence HOJE!':'📅 Vence em '+dv+' dias';
      var titulo = emprestimos.length>1?'Empréstimo '+(idx+1)+(e.pt?' — Parcela '+e.pa+'/'+e.pt:''):'';

      html += '<div class="emp-card">';
      if(titulo) html += '<div class="emp-title">'+titulo+'</div>';
      html += '<div class="due" style="background:'+cor+'22;border:1px solid '+cor+'55;color:'+cor+'">'+dvTxt+' ('+fmtData(e.v)+')</div>';
      html += '<div class="val-box">'
        +'<div class="val-label">Valor hoje</div>'
        +'<div class="val">'+fmtBRL(vh)+'</div>'
        +(e.vp?'':'<div class="val-sub">Valor final: '+fmtBRL(vf)+' · Por dia: '+fmtBRL(pd)+'</div>')
        +'</div>';
      html += '<div class="info-grid">'
        +'<div class="info-item"><div class="info-label">Emprestado</div><div class="info-val">'+fmtBRL(e.p)+'</div></div>'
        +'<div class="info-item"><div class="info-label">Taxa</div><div class="info-val">'+e.t+'%/mês</div></div>'
        +'</div></div>';
    });

    html += '<div class="pix-box"><div class="pix-label">💳 PIX para pagamento</div><div class="pix-val">40161279805</div></div>';
    html += '<div style="text-align:center;font-size:11px;color:#8b949e;margin-top:12px">🔄 Atualizado automaticamente todo dia</div>';
    cont.innerHTML = html;
  } catch(err) {
    cont.innerHTML = '<div class="error"><div class="error-icon">❌</div><div class="error-txt">Erro ao carregar dados.<br><small>'+err.message+'</small></div></div>';
  }
}
</script>
</body>
</html>
